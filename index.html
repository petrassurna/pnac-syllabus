<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PNAC Syllabus 2026/27</title>
  <meta name="theme-color" content="#0a2142" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PNAC" />

  <style>
    :root {
      --bg: #071a33;
      --bg2: #0a2142;
      --card: rgba(255, 255, 255, 0.045);
      --card-brd: rgba(255, 255, 255, 0.09);
      --txt: #eaf2ff;
      --muted: #8aa2c4;
      --salt: #38bdf8;
      --fresh: #34d399;
      --surf: #fbbf24;
      --event: #a78bfa;
      --safe-top: env(safe-area-inset-top, 0px);
      --hh: 156px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--txt);
      background:
        radial-gradient(1200px 700px at 80% -10%, #12406b 0%, transparent 55%),
        radial-gradient(900px 600px at -10% 20%, #0e5f68 0%, transparent 50%),
        linear-gradient(180deg, var(--bg) 0%, #04101f 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 560px; margin: 0 auto; }

    /* ---------- locked header + filters ---------- */
    header.top {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(var(--safe-top) + 16px) 18px 12px;
      background: linear-gradient(180deg, rgba(7, 26, 51, 0.96) 60%, rgba(7, 26, 51, 0.7) 100%);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand { display: flex; align-items: center; gap: 11px; }
    .brand img { width: 34px; height: 34px; border-radius: 9px; }
    .brand .name { font-weight: 800; letter-spacing: 2px; font-size: 15px; }
    .brand .sub {
      margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 600;
      letter-spacing: .5px;
    }

    h1 {
      font-size: 26px; font-weight: 800; margin: 12px 0 2px; letter-spacing: -.4px;
      background: linear-gradient(90deg, #eaf2ff, #7fd7ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .club-name {
      font-size: 12.5px; color: var(--muted); font-weight: 600; letter-spacing: .3px;
      margin: 0 0 13px;
    }

    .filters {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; border: 1px solid var(--card-brd); background: rgba(255,255,255,.04);
      color: var(--muted); font-weight: 700; font-size: 13px; letter-spacing: .3px;
      padding: 9px 15px; border-radius: 999px; cursor: pointer; white-space: nowrap;
      transition: .18s ease; display: flex; align-items: center; gap: 7px;
    }
    .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
    .chip[aria-pressed="true"] { color: #041022; background: var(--txt); border-color: transparent; }
    .chip[data-f="Saltwater"][aria-pressed="true"] { background: var(--salt); }
    .chip[data-f="Freshwater"][aria-pressed="true"] { background: var(--fresh); }
    .chip[data-f="Surf/Estuary"][aria-pressed="true"] { background: var(--surf); }
    .chip[data-f="Events"][aria-pressed="true"] { background: var(--event); }

    /* ---------- list ---------- */
    main { padding: 8px 14px 130px; }

    .month {
      position: sticky; top: calc(var(--hh) - 4px); z-index: 5;
      font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); padding: 16px 6px 8px;
    }

    .card {
      position: relative; display: flex; gap: 14px; align-items: stretch;
      background: var(--card); border: 1px solid var(--card-brd);
      border-radius: 18px; padding: 15px 16px 15px 14px; margin: 10px 0;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .accent { flex: 0 0 5px; border-radius: 999px; align-self: stretch; }
    .body { flex: 1; min-width: 0; }
    .date { font-size: 13.5px; font-weight: 700; letter-spacing: .5px; color: var(--muted); }
    .loc { font-size: 17px; font-weight: 600; margin: 4px 0 9px; letter-spacing: -.1px; line-height: 1.25; }
    .badge {
      display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 800;
      padding: 6px 11px; border-radius: 999px; letter-spacing: .3px;
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .badge .dot { width: 9px; height: 9px; border-radius: 50%; }

    /* next-up highlight */
    .card.next {
      border-color: transparent;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.14), rgba(56, 189, 248, 0.04));
      box-shadow: 0 0 0 1px rgba(127, 215, 255, 0.5), 0 14px 40px -14px rgba(56, 189, 248, 0.55);
      transform: translateZ(0);
      scroll-margin-top: calc(var(--hh) + 24px);
    }
    .next-tag {
      position: absolute; top: 12px; right: 12px;
      font-size: 10px; font-weight: 900; letter-spacing: 1.5px;
      color: #041022; background: #7fd7ff; padding: 4px 9px; border-radius: 999px;
    }
    .card.next .loc { padding-right: 70px; }

    .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-weight: 600; }

    /* ---------- install UI ---------- */
    #install {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      display: none; align-items: center; gap: 9px;
      background: linear-gradient(90deg, #38bdf8, #22d3ee); color: #041022;
      font-weight: 800; font-size: 15px; letter-spacing: .3px;
      border: none; padding: 13px 22px; border-radius: 999px; cursor: pointer;
      box-shadow: 0 14px 34px -10px rgba(56, 189, 248, 0.7); z-index: 30;
    }
    #install.show { display: inline-flex; }

    #ios-hint {
      position: fixed; left: 12px; right: 12px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      display: none; z-index: 30;
      background: rgba(12, 34, 62, 0.97); backdrop-filter: blur(12px);
      border: 1px solid var(--card-brd); border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.8);
    }
    #ios-hint.show { display: block; }
    #ios-hint p { margin: 0; font-size: 13.5px; color: var(--txt); line-height: 1.45; }
    #ios-hint .share { display: inline-block; transform: translateY(2px); }
    #ios-hint button {
      margin-top: 10px; background: rgba(255,255,255,.08); color: var(--txt);
      border: 1px solid var(--card-brd); border-radius: 10px; padding: 7px 12px;
      font-weight: 700; font-size: 12px; cursor: pointer;
    }

    /* ---------- intro splash ---------- */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; padding: 24px;
      background: radial-gradient(1000px 720px at 50% 22%, #12406b 0%, #04101f 70%);
      transition: opacity .7s ease, visibility .7s ease;
    }
    #splash.hide { opacity: 0; visibility: hidden; }
    #splash .mark { position: relative; display: grid; place-items: center; }
    #splash .fish {
      width: 118px; height: 118px; border-radius: 27px;
      box-shadow: 0 22px 60px -12px rgba(56, 189, 248, 0.6);
      animation: pop .9s cubic-bezier(.2, .8, .2, 1) both, bob 2.8s ease-in-out .9s infinite;
    }
    #splash .ring {
      position: absolute; width: 118px; height: 118px; border-radius: 50%;
      border: 2px solid rgba(127, 215, 255, 0.55);
      animation: ripple 1.9s ease-out .4s infinite;
    }
    #splash .club {
      opacity: 0; text-align: center; font-weight: 800; letter-spacing: .3px;
      font-size: 22px; line-height: 1.25; max-width: 320px; color: #eaf2ff;
      animation: rise .7s ease .55s both;
    }
    #splash .syl {
      opacity: 0; color: #7fd7ff; font-weight: 800; letter-spacing: 3px; font-size: 13px;
      text-transform: uppercase; animation: rise .7s ease .8s both;
    }
    @keyframes pop { from { transform: scale(.4); opacity: 0 } to { transform: scale(1); opacity: 1 } }
    @keyframes bob { 0%, 100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }
    @keyframes ripple { 0% { transform: scale(1); opacity: .6 } 100% { transform: scale(2.5); opacity: 0 } }
    @keyframes rise { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
    @media (prefers-reduced-motion: reduce) {
      #splash .fish, #splash .ring, #splash .club, #splash .syl {
        animation-duration: .01ms !important; animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="mark">
      <span class="ring"></span>
      <img class="fish" src="icon-512.png" alt="" />
    </div>
    <div class="club">Preston Northcote<br />Angling Club</div>
    <div class="syl">Syllabus 2026 – 27</div>
  </div>

  <div class="wrap">
    <header class="top">
      <div class="brand">
        <img src="icon-192.png" alt="" />
        <span class="name">PNAC</span>
        <span class="sub" id="count">2026 / 27 Season</span>
      </div>
      <h1>Syllabus</h1>
      <p class="club-name">Preston Northcote Angling Club · 2026 – 27</p>
      <div class="filters" id="filters">
        <button class="chip" data-f="All" aria-pressed="true">All</button>
        <button class="chip" data-f="Saltwater" aria-pressed="false"><span class="dot" style="background:var(--salt)"></span>Saltwater</button>
        <button class="chip" data-f="Freshwater" aria-pressed="false"><span class="dot" style="background:var(--fresh)"></span>Freshwater</button>
        <button class="chip" data-f="Surf/Estuary" aria-pressed="false"><span class="dot" style="background:var(--surf)"></span>Surf/Estuary</button>
        <button class="chip" data-f="Events" aria-pressed="false"><span class="dot" style="background:var(--event)"></span>Events</button>
      </div>
    </header>

    <main id="list"></main>
  </div>

  <button id="install">⬇ Install app</button>

  <div id="ios-hint">
    <p>Install this app: tap the <b>Share</b> <span class="share">⎋</span> button, then <b>“Add to Home Screen”</b>.</p>
    <button id="ios-dismiss">Got it</button>
  </div>

  <script>
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function colorFor(item) {
      if (item.kind === 'event') return 'var(--event)';
      if (item.type === 'Saltwater') return 'var(--salt)';
      if (item.type === 'Freshwater') return 'var(--fresh)';
      if (item.type === 'Surf/Estuary') return 'var(--surf)';
      return null; // combined
    }
    function accentStyle(item) {
      const c = colorFor(item);
      if (c) return `background:${c}`;
      return 'background:linear-gradient(180deg,var(--salt),var(--surf))';
    }
    function startDate(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }

    function matches(item, f) {
      if (f === 'All') return true;
      if (f === 'Events') return item.kind === 'event';
      return item.kind === 'trip' && item.type.includes(f);
    }

    let TRIPS = [];
    let filter = 'All';

    function render() {
      const list = document.getElementById('list');
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const items = TRIPS.filter((t) => matches(t, filter));

      // next = first upcoming (today or later) in the CURRENT filtered view
      let nextIdx = items.findIndex((t) => startDate(t.start) >= today);

      list.innerHTML = '';
      if (!items.length) { list.innerHTML = '<div class="empty">No dates for this filter.</div>'; return; }

      let curMonth = '';
      items.forEach((t, i) => {
        const dt = startDate(t.start);
        const mk = MONTHS[dt.getMonth()] + ' ' + dt.getFullYear();
        if (mk !== curMonth) {
          curMonth = mk;
          const h = document.createElement('div');
          h.className = 'month'; h.textContent = mk;
          list.appendChild(h);
        }
        const isNext = i === nextIdx;
        const card = document.createElement('div');
        card.className = 'card' + (isNext ? ' next' : '');
        if (isNext) card.id = 'next-card';
        card.innerHTML =
          `<div class="accent" style="${accentStyle(t)}"></div>
           <div class="body">
             <div class="date">${t.display}</div>
             <div class="loc">${t.location}</div>
             <span class="badge"><span class="dot" style="${accentStyle(t)}"></span>${t.type}</span>
           </div>
           ${isNext ? '<span class="next-tag">NEXT UP</span>' : ''}`;
        list.appendChild(card);
      });

      const next = document.getElementById('next-card');
      if (next) requestAnimationFrame(() => setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'center' }), 60));
    }

    // filters
    document.getElementById('filters').addEventListener('click', (e) => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      filter = chip.dataset.f;
      document.querySelectorAll('.chip').forEach((c) => c.setAttribute('aria-pressed', c === chip));
      render();
    });

    // load data
    fetch('trips.json', { cache: 'no-cache' })
      .then((r) => r.json())
      .then((d) => { TRIPS = d; document.getElementById('count').textContent = d.length + ' dates · 2026/27'; render(); })
      .catch(() => { document.getElementById('list').innerHTML = '<div class="empty">Could not load syllabus.</div>'; });

    // keep sticky offsets in sync with the actual (variable) header height
    const header = document.querySelector('header.top');
    function syncHeader() {
      document.documentElement.style.setProperty('--hh', header.offsetHeight + 'px');
    }
    window.addEventListener('resize', syncHeader);
    window.addEventListener('load', syncHeader);
    syncHeader();

    // intro splash -> fade to listing
    const splash = document.getElementById('splash');
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    function dismissSplash() { splash.classList.add('hide'); }
    setTimeout(dismissSplash, reduce ? 400 : 2300);
    splash.addEventListener('click', dismissSplash);
    splash.addEventListener('transitionend', () => splash.remove());

    // service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }

    // install prompt (Android / desktop Chrome)
    let deferred = null;
    const installBtn = document.getElementById('install');
    const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferred = e;
      if (!standalone) installBtn.classList.add('show');
    });
    installBtn.addEventListener('click', async () => {
      if (!deferred) return;
      deferred.prompt();
      await deferred.userChoice;
      deferred = null; installBtn.classList.remove('show');
    });
    window.addEventListener('appinstalled', () => installBtn.classList.remove('show'));

    // iOS install hint (Safari has no beforeinstallprompt)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = isIOS && !/crios|fxios/i.test(navigator.userAgent);
    if (isIOS && isSafari && !standalone && !localStorage.getItem('iosHintDismissed')) {
      setTimeout(() => document.getElementById('ios-hint').classList.add('show'), 1200);
    }
    document.getElementById('ios-dismiss').addEventListener('click', () => {
      document.getElementById('ios-hint').classList.remove('show');
      localStorage.setItem('iosHintDismissed', '1');
    });
  </script>
</body>

</html>
