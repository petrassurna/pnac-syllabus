      <path fill="#b23b28" stroke="#39291a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" d="M470 244 L500 240 L492 258 L470 262 Z"/>
      <path fill="none" stroke="#39291a" stroke-width="5" stroke-linecap="round" d="M452 256 L474 256"/>
      <circle cx="432" cy="238" r="13" fill="#fff" stroke="#39291a" stroke-width="5"/>
      <circle cx="434" cy="239" r="6.5" fill="#241a10"/>
