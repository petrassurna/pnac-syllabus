        <circle cx="250" cy="216" r="9"/><circle cx="290" cy="208" r="8"/>
        <circle cx="322" cy="208" r="7"/><circle cx="214" cy="226" r="8"/>
        <circle cx="182" cy="234" r="7"/><circle cx="152" cy="242" r="7"/>
        <circle cx="278" cy="230" r="7"/><circle cx="232" cy="242" r="6"/>
        <circle cx="312" cy="230" r="6"/><circle cx="346" cy="224" r="6"/>
        <circle cx="370" cy="234" r="5"/>
        <circle cx="72" cy="228" r="5"/><circle cx="74" cy="292" r="5"/>
