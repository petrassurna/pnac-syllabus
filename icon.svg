      <g stroke="#8a6d2f" stroke-width="3" fill="none" stroke-linecap="round">
        <path d="M62 208 L110 256 M56 256 L118 256 M62 304 L110 258"/>
        <path d="M234 178 L252 152 M268 172 L282 148 M298 174 L308 156"/>
