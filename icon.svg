      <!-- body -->
      <path fill="#8f9d55" d="M476 256 C456 210 398 190 330 190 C248 186 162 200 116 246 C110 252 110 260 116 266 C162 312 248 326 330 322 C398 322 456 302 476 256 Z"/>
      <path fill="#efe6c9" d="M476 256 C456 302 398 322 330 322 C248 326 162 312 116 266 C172 300 250 300 322 292 C398 282 456 270 476 256 Z"/>
      <path fill="none" stroke="#e8895a" stroke-width="13" stroke-linecap="round" d="M120 272 C214 262 330 250 452 248"/>

